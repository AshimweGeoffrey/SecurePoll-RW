<!-- @dsCard group="Brand" viewport="640x520" name="Loading animation" subtitle="Imigongo diamonds converging into the Ingabo emblem" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SecurePoll RW — Loading animation</title>
<link rel="stylesheet" href="./styles.css">
<link rel="stylesheet" href="./loader.css">
<style>
  html,body{ margin:0; }
  .demo{ min-height:100vh; display:grid; place-items:center; background:var(--bg-canvas);
    font-family:var(--font-sans); }
  .demo__inner{ text-align:center; }
  .demo__h{ font-family:var(--font-display); font-size:22px; font-weight:600; color:var(--text-strong); margin:0; }
  .demo__p{ font-size:14px; color:var(--text-muted); margin:8px 0 22px; max-width:420px; }
  .demo__btn{ font-family:var(--font-sans); font-size:14px; font-weight:600; color:#fff;
    background:var(--primary); border:none; border-radius:var(--radius-md); padding:11px 20px; cursor:pointer; }
  .demo__btn:hover{ filter:brightness(.96); }
  /* shorten the demo loop so the replay reveals quickly */
  .sp-loader{ background:var(--bg-canvas); }
</style>
</head>
<body>
<div class="demo">
  <div class="demo__inner">
    <h1 class="demo__h">Imigongo loading animation</h1>
    <p class="demo__p">The black-and-white Imigongo diamonds converge to assemble the Ingabo emblem, then hold a gentle loop until the page is ready.</p>
    <button class="demo__btn" onclick="window.SPLoader && (SPLoader.show(), setTimeout(()=>SPLoader.hide(), 2600))">Replay loader</button>
  </div>
</div>
<script src="./loader.js"></script>
</body>
</html>
