<!-- @dsCard group="Type" viewport="700x200" name="Display — Zilla Slab" subtitle="Headlines, official documents, big numbers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-surface); margin: 0; padding: 24px; font-family: var(--font-display); }
  .big { font-family: var(--font-display); font-weight: 600; font-size: 46px; line-height: 1.04; letter-spacing: -0.02em; color: var(--text-strong); }
  .sub { font-family: var(--font-display); font-weight: 500; font-size: 22px; color: var(--text-default); margin-top: 8px; }
  .meta { font-family: var(--font-sans); font-size: 11px; letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--text-muted); margin-top: 16px; display:flex; gap:16px; }
  .meta b { color: var(--text-strong); font-weight: 700; }
</style>
</head>
<body>
  <div class="big">Verified, every voter</div>
  <div class="sub">National Electoral Commission · Rwanda</div>
  <div class="meta"><span><b>Zilla Slab</b></span><span>400 · 500 · 600 · 700</span><span>−2% tracking</span></div>
</body>
</html>
