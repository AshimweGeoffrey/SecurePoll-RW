<!-- @dsCard group="Type" viewport="700x230" name="UI / Body — Hanken Grotesk" subtitle="Interface text, forms, tables, paragraphs" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-surface); margin: 0; padding: 24px; font-family: var(--font-sans); color: var(--text-default); }
  .lede { font-size: 17px; font-weight: 500; color: var(--text-strong); line-height: 1.4; max-width: 560px; }
  .body { font-size: 15px; line-height: 1.65; color: var(--text-default); margin-top: 10px; max-width: 560px; }
  .weights { display:flex; gap: 20px; margin-top: 16px; }
  .weights span { font-size: 15px; }
  .meta { font-size: 11px; letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--text-muted); margin-top: 16px; }
  .meta b { color: var(--text-strong); font-weight: 700; }
</style>
</head>
<body>
  <div class="lede">Officers confirm identity in under half a second.</div>
  <div class="body">Each verification fuses a live face match with a fingerprint scan, then returns a confidence score and a plain-language explanation the polling officer can act on.</div>
  <div class="weights">
    <span style="font-weight:400">Regular 400</span>
    <span style="font-weight:500">Medium 500</span>
    <span style="font-weight:600">Semibold 600</span>
    <span style="font-weight:700">Bold 700</span>
  </div>
  <div class="meta"><b>Hanken Grotesk</b> · ss01 alt enabled</div>
</body>
</html>
