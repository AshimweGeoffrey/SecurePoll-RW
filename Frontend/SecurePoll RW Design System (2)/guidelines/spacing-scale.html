<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="8px base grid with 2/4px half-steps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-surface); margin: 0; padding: 24px; font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { text-align: center; }
  .bar { background: var(--primary-soft); border: 1px solid var(--primary-soft-border); border-radius: var(--radius-xs); }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 6px; }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px;height:4px"></div><div class="tok">1</div><div class="val">4</div></div>
    <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="tok">2</div><div class="val">8</div></div>
    <div class="item"><div class="bar" style="width:12px;height:12px"></div><div class="tok">3</div><div class="val">12</div></div>
    <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="tok">4</div><div class="val">16</div></div>
    <div class="item"><div class="bar" style="width:20px;height:20px"></div><div class="tok">5</div><div class="val">20</div></div>
    <div class="item"><div class="bar" style="width:24px;height:24px"></div><div class="tok">6</div><div class="val">24</div></div>
    <div class="item"><div class="bar" style="width:32px;height:32px"></div><div class="tok">8</div><div class="val">32</div></div>
    <div class="item"><div class="bar" style="width:48px;height:48px"></div><div class="tok">12</div><div class="val">48</div></div>
    <div class="item"><div class="bar" style="width:64px;height:64px"></div><div class="tok">16</div><div class="val">64</div></div>
    <div class="item"><div class="bar" style="width:80px;height:80px"></div><div class="tok">20</div><div class="val">80</div></div>
  </div>
</body>
</html>
