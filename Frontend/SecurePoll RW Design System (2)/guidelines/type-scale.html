<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="Modular ramp from micro-label to number hero" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-surface); margin: 0; padding: 22px 24px; font-family: var(--font-sans); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: none; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 64px; flex-shrink: 0; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); width: 42px; flex-shrink:0; text-align:right; }
  .sample { color: var(--text-strong); font-family: var(--font-display); font-weight: 600; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="row"><span class="tok">6xl</span><span class="px">68</span><span class="sample" style="font-size:38px">62.4%</span></div>
  <div class="row"><span class="tok">4xl</span><span class="px">40</span><span class="sample" style="font-size:34px">Election day</span></div>
  <div class="row"><span class="tok">3xl</span><span class="px">31</span><span class="sample" style="font-size:27px">Voter verification</span></div>
  <div class="row"><span class="tok">2xl</span><span class="px">24</span><span class="sample" style="font-size:22px">Fraud detection dashboard</span></div>
  <div class="row"><span class="tok">xl</span><span class="px">20</span><span class="sample" style="font-size:19px;font-family:var(--font-sans)">Polling Station 014 — Nyarugenge</span></div>
  <div class="row"><span class="tok">md</span><span class="px">15</span><span class="sample" style="font-size:15px;font-family:var(--font-sans);font-weight:400;color:var(--text-default)">Body default — interface and paragraph text.</span></div>
  <div class="row"><span class="tok">xs</span><span class="px">12</span><span class="sample" style="font-size:12px;font-family:var(--font-sans);font-weight:500;color:var(--text-muted)">Meta · table caption · timestamps</span></div>
</body>
</html>
