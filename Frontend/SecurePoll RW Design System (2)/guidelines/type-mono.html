<!-- @dsCard group="Type" viewport="700x215" name="Data / Mono — JetBrains Mono" subtitle="Scores, IDs, hashes, API endpoints, tabular numbers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-surface); margin: 0; padding: 24px; font-family: var(--font-mono); }
  .score { font-family: var(--font-mono); font-size: 40px; font-weight: 700; color: var(--status-approved-text); letter-spacing: -0.02em; }
  .score small { font-size: 18px; color: var(--text-muted); font-weight: 500; }
  .lines { margin-top: 14px; font-size: 13px; line-height: 1.9; color: var(--text-default); }
  .k { color: var(--text-muted); }
  .ep { color: var(--status-approved-text); }
  .meta { font-family: var(--font-sans); font-size: 11px; letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--text-muted); margin-top: 14px; }
  .meta b { color: var(--text-strong); font-weight: 700; }
</style>
</head>
<body>
  <div class="score">0.91<small> / 1.00 confidence</small></div>
  <div class="lines">
    <div><span class="k">POST</span> <span class="ep">/ai/verify/multimodal</span></div>
    <div><span class="k">voter_id</span> = RW-2026-0F3A-91C7 &nbsp; <span class="k">fusion</span> = 0.91</div>
    <div><span class="k">entry_hash</span> = a3f9…7c21 &nbsp; 0123456789</div>
  </div>
  <div class="meta"><b>JetBrains Mono</b> · tabular-nums</div>
</body>
</html>
