<!-- @dsCard group="Colors" viewport="700x190" name="Neutral — Slate" subtitle="Canvas, surfaces, text, borders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-surface); margin: 0; padding: 22px 24px; font-family: var(--font-sans); }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; height: 84px; border-radius: var(--radius-md); display: flex; align-items: flex-end; padding: 7px; box-shadow: var(--inset-hairline); }
  .meta { margin-top: 7px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .lbl { font: var(--fw-bold) 11px/1 var(--font-sans); letter-spacing: var(--ls-caps); text-transform: uppercase; color: #fff; }
  .cap { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
  .cap b { color: var(--text-strong); font-weight: 600; }
</style>
</head>
<body>
  <div class="cap"><b>Slate 700</b> · <span class="t-data">#36404f</span> — text, surfaces, borders, canvas</div>
  <div class="row">
    <div class="sw" style="background:var(--slate-50)"></div>
    <div class="sw" style="background:var(--slate-100)"></div>
    <div class="sw" style="background:var(--slate-200)"></div>
    <div class="sw" style="background:var(--slate-300)"></div>
    <div class="sw" style="background:var(--slate-400)"></div>
    <div class="sw" style="background:var(--slate-500)"><span class="lbl">500</span></div>
    <div class="sw" style="background:var(--slate-600)"><span class="lbl">600</span></div>
    <div class="sw" style="background:var(--slate-700)"><span class="lbl">700</span></div>
    <div class="sw" style="background:var(--slate-800)"><span class="lbl">800</span></div>
    <div class="sw" style="background:var(--slate-900)"><span class="lbl">900</span></div>
    <div class="sw" style="background:var(--slate-950)"><span class="lbl">950</span></div>
  </div>
  <div class="row meta">
    <div style="flex:1" class="hex">50</div>
    <div style="flex:1" class="hex">100</div>
    <div style="flex:1" class="hex">200</div>
    <div style="flex:1" class="hex">300</div>
    <div style="flex:1" class="hex">400</div>
    <div style="flex:1" class="hex">500</div>
    <div style="flex:1" class="hex">600</div>
    <div style="flex:1" class="hex">700</div>
    <div style="flex:1" class="hex">800</div>
    <div style="flex:1" class="hex">900</div>
    <div style="flex:1" class="hex">950</div>
  </div>
</body>
</html>
