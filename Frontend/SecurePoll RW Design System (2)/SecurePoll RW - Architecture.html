  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   SecurePoll RW — Color System\n   Neutral slate canvas + electoral green primary.\n   Raw palette (scales) + semantic aliases (light default, dark override).\n   ============================================================ */\n\n:root {\n  /* ---- Slate (neutral) ---- */\n  --slate-50:  #f6f8fa;\n  --slate-100: #eceff3;\n  --slate-200: #dde3ea;\n  --slate-300: #c3cdd8;\n  --slate-400: #93a1b3;\n  --slate-500: #647084;\n  --slate-600: #495568;\n  --slate-700: #36404f;\n  --slate-800: #232b37;\n  --slate-900: #161c26;\n  --slate-950: #0d121a;\n\n  /* ---- Electoral Green (primary) ---- */\n  --green-50:  #e9f9ef;\n  --green-100: #cdf0db;\n  --green-200: #9ce0ba;\n  --green-300: #5fc98e;\n  --green-400: #2fae6a;\n  --green-500: #16924f;   /* primary */\n  --green-600: #0f7740;\n  --green-700: #0c5f34;\n  --green-800: #0c4c2c;\n  --green-900: #093c24;\n\n  /* ---- Civic Blue (secondary / info / \"verified\") ---- */\n  --blue-50:  #eaf2ff;\n  --blue-100: #d2e2ff;\n  --blue-200: #a8c6ff;\n  --blue-300: #75a3fb;\n  --blue-400: #4a82f0;\n  --blue-500: #2563d9;\n  --blue-600: #1b4cb3;\n  --blue-700: #163d8f;\n  --blue-800: #163770;\n  --blue-900: #14305c;\n\n  /* ---- Red (rejected / danger) ---- */\n  --red-50:  #fdecec;\n  --red-100: #fbd4d4;\n  --red-200: #f6a9a9;\n  --red-300: #ee7676;\n  --red-400: #e24b4b;\n  --red-500: #cf2f2f;\n  --red-600: #ad2222;\n  --red-700: #8c1c1c;\n  --red-800: #701919;\n  --red-900: #5b1717;\n\n  /* ---- Amber (manual review / warning) ---- */\n  --amber-50:  #fdf4e3;\n  --amber-100: #fbe6bd;\n  --amber-200: #f6cd7e;\n  --amber-300: #efb049;\n  --amber-400: #e0951f;\n  --amber-500: #c27a0e;\n  --amber-600: #9c5f0c;\n  --amber-700: #7c4b10;\n  --amber-800: #663e12;\n  --amber-900: #553413;\n\n  /* ---- Brand gradient anchors ---- */\n  --grad-ink-from: #161c26;\n  --grad-ink-to:   #0d121a;\n  --grad-green-from: #16924f;\n  --grad-green-to:   #0c5f34;\n}\n\n/* =========================================================\n   SEMANTIC ALIASES — LIGHT (default)\n   ========================================================= */\n:root {\n  color-scheme: light;\n\n  /* surfaces */\n  --bg-canvas:    var(--slate-50);\n  --bg-surface:   #ffffff;\n  --bg-subtle:    var(--slate-100);\n  --bg-inset:     var(--slate-100);\n  --bg-overlay:   rgba(13, 18, 26, 0.45);\n\n  /* borders */\n  --border-subtle:  var(--slate-200);\n  --border-default: var(--slate-300);\n  --border-strong:  var(--slate-400);\n\n  /* text */\n  --text-strong:    var(--slate-900);\n  --text-default:   var(--slate-700);\n  --text-muted:     var(--slate-500);\n  --text-subtle:    var(--slate-400);\n  --text-on-accent: #ffffff;\n  --text-link:      var(--blue-500);\n\n  /* primary (electoral green) */\n  --primary:        var(--green-500);\n  --primary-hover:  var(--green-600);\n  --primary-press:  var(--green-700);\n  --primary-soft:   var(--green-50);\n  --primary-soft-border: var(--green-200);\n  --primary-text:   var(--green-700);\n\n  /* secondary (civic blue) */\n  --secondary:      var(--blue-500);\n  --secondary-soft: var(--blue-50);\n  --secondary-text: var(--blue-700);\n\n  /* status: approved / rejected / review / info */\n  --status-approved:      var(--green-500);\n  --status-approved-soft: var(--green-50);\n  --status-approved-text: var(--green-700);\n  --status-rejected:      var(--red-500);\n  --status-rejected-soft: var(--red-50);\n  --status-rejected-text: var(--red-700);\n  --status-review:        var(--amber-400);\n  --status-review-soft:   var(--amber-50);\n  --status-review-text:   var(--amber-700);\n  --status-info:          var(--blue-500);\n  --status-info-soft:     var(--blue-50);\n  --status-info-text:     var(--blue-700);\n\n  /* focus ring */\n  --ring: color-mix(in oklab, var(--green-500) 55%, transparent);\n\n  /* diagram bands (architecture visuals) */\n  --band-client:  #eef3f8;\n  --band-gateway: #e9f9ef;\n  --band-service: #ffffff;\n  --band-data:    #f1f4f9;\n  --band-secure:  #14305c;\n}\n\n/* =========================================================\n   SEMANTIC ALIASES — DARK (kiosk / polling station)\n   ========================================================= */\n[data-theme=\"dark\"] {\n  color-scheme: dark;\n\n  --bg-canvas:    var(--slate-950);\n  --bg-surface:   var(--slate-900);\n  --bg-subtle:    var(--slate-800);\n  --bg-inset:     #10151d;\n  --bg-overlay:   rgba(0, 0, 0, 0.6);\n\n  --border-subtle:  #232b37;\n  --border-default: var(--slate-700);\n  --border-strong:  var(--slate-600);\n\n  --text-strong:    var(--slate-50);\n  --text-default:   var(--slate-200);\n  --text-muted:     var(--slate-400);\n  --text-subtle:    var(--slate-500);\n  --text-on-accent: #ffffff;\n  --text-link:      var(--blue-300);\n\n  --primary:        var(--green-400);\n  --primary-hover:  var(--green-300);\n  --primary-press:  var(--green-500);\n  --primary-soft:   rgba(47, 174, 106, 0.14);\n  --primary-soft-border: rgba(47, 174, 106, 0.35);\n  --primary-text:   var(--green-300);\n\n  --secondary:      var(--blue-400);\n  --secondary-soft: rgba(74, 130, 240, 0.14);\n  --secondary-text: var(--blue-300);\n\n  --status-approved:      var(--green-400);\n  --status-approved-soft: rgba(47, 174, 106, 0.16);\n  --status-approved-text: var(--green-300);\n  --status-rejected:      var(--red-400);\n  --status-rejected-soft: rgba(226, 75, 75, 0.16);\n  --status-rejected-text: #f3a3a3;\n  --status-review:        var(--amber-300);\n  --status-review-soft:   rgba(239, 176, 73, 0.16);\n  --status-review-text:   var(--amber-200);\n  --status-info:          var(--blue-400);\n  --status-info-soft:     rgba(74, 130, 240, 0.16);\n  --status-info-text:     var(--blue-300);\n\n  --ring: color-mix(in oklab, var(--green-400) 60%, transparent);\n\n  --band-client:  #161c26;\n  --band-gateway: #10211a;\n  --band-service: #1a212c;\n  --band-data:    #131a24;\n  --band-secure:  #0a1830;\n}\n\n/* ============================================================\n   SecurePoll RW — Typography\n   Hanken Grotesk (UI/body) · Zilla Slab (display/official) · JetBrains Mono (data)\n   Fonts loaded via tokens/fonts.css\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-sans:    \"Hanken Grotesk\", system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n  --font-display: \"Zilla Slab\", Georgia, \"Times New Roman\", serif;\n  --font-mono:    \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  /* ---- Type scale (rem, 16px base) ---- */\n  --text-3xs: 0.625rem;  /* 10 — micro labels, legal */\n  --text-2xs: 0.6875rem; /* 11 — chip / overline */\n  --text-xs:  0.75rem;   /* 12 — meta, table caption */\n  --text-sm:  0.8125rem; /* 13 — dense UI, secondary */\n  --text-md:  0.9375rem; /* 15 — body default */\n  --text-lg:  1.0625rem; /* 17 — emphasized body */\n  --text-xl:  1.25rem;   /* 20 — card title */\n  --text-2xl: 1.5rem;    /* 24 — section title */\n  --text-3xl: 1.9375rem; /* 31 — page title */\n  --text-4xl: 2.5rem;    /* 40 — display */\n  --text-5xl: 3.25rem;   /* 52 — hero */\n  --text-6xl: 4.25rem;   /* 68 — diagram / number hero */\n\n  /* ---- Weights ---- */\n  --fw-regular:  400; /* @kind other */\n  --fw-medium:   500; /* @kind other */\n  --fw-semibold: 600; /* @kind other */\n  --fw-bold:     700; /* @kind other */\n  --fw-extra:    800; /* @kind other */\n\n  /* ---- Line heights ---- */\n  --lh-tight:   1.08; /* @kind other */\n  --lh-snug:    1.25; /* @kind other */\n  --lh-normal:  1.5; /* @kind other */\n  --lh-relaxed: 1.65; /* @kind other */\n\n  /* ---- Letter spacing ---- */\n  --ls-tight:   -0.02em;\n  --ls-snug:    -0.01em;\n  --ls-normal:  0em;\n  --ls-wide:    0.04em;\n  --ls-caps:    0.08em;   /* overlines / eyebrows */\n\n  /* ---- Semantic roles ---- */\n  --role-eyebrow-size: var(--text-2xs);\n  --role-eyebrow-weight: var(--fw-bold);\n  --role-eyebrow-spacing: var(--ls-caps);\n\n  --role-body-size: var(--text-md);\n  --role-body-line: var(--lh-relaxed);\n\n  --role-data-family: var(--font-mono);\n}\n\n/* Utility specimens used by cards & kits */\n.t-eyebrow {\n  font-family: var(--font-sans);\n  font-size: var(--role-eyebrow-size);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--ls-caps);\n  text-transform: uppercase;\n  color: var(--text-muted);\n}\n.t-display {\n  font-family: var(--font-display);\n  font-weight: var(--fw-semibold);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-tight);\n  color: var(--text-strong);\n}\n.t-data {\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums;\n  letter-spacing: var(--ls-snug);\n}\n\n/* ============================================================\n   SecurePoll RW — Spacing & Layout\n   8px base grid with 2/4px half-steps for dense UI.\n   ============================================================ */\n\n:root {\n  --space-0:   0;\n  --space-px:  1px;\n  --space-0-5: 0.125rem; /* 2  */\n  --space-1:   0.25rem;  /* 4  */\n  --space-1-5: 0.375rem; /* 6  */\n  --space-2:   0.5rem;   /* 8  */\n  --space-3:   0.75rem;  /* 12 */\n  --space-4:   1rem;     /* 16 */\n  --space-5:   1.25rem;  /* 20 */\n  --space-6:   1.5rem;   /* 24 */\n  --space-8:   2rem;     /* 32 */\n  --space-10:  2.5rem;   /* 40 */\n  --space-12:  3rem;     /* 48 */\n  --space-16:  4rem;     /* 64 */\n  --space-20:  5rem;     /* 80 */\n  --space-24:  6rem;     /* 96 */\n\n  /* ---- Layout primitives ---- */\n  --container-sm:  640px;\n  --container-md:  840px;\n  --container-lg:  1080px;\n  --container-xl:  1280px;\n  --container-2xl: 1440px;\n\n  --gutter:        var(--space-6);\n  --section-y:     var(--space-12);\n\n  /* ---- Component density tokens ---- */\n  --control-h-sm: 32px;\n  --control-h-md: 40px;\n  --control-h-lg: 48px;\n  --control-h-xl: 56px;   /* kiosk touch targets */\n  --touch-min:    44px;   /* minimum tablet hit target */\n\n  --field-pad-x:  var(--space-3);\n  --card-pad:     var(--space-5);\n  --card-pad-lg:  var(--space-6);\n}\n\n/* ============================================================\n   SecurePoll RW — Elevation, Radii, Borders\n   Soft civic shadows (low spread, cool tint). Restrained rounding.\n   ============================================================ */\n\n:root {\n  /* ---- Corner radii ---- */\n  --radius-xs:   3px;\n  --radius-sm:   5px;\n  --radius-md:   8px;    /* default control / card inner */\n  --radius-lg:   12px;   /* cards */\n  --radius-xl:   16px;   /* panels, modals */\n  --radius-2xl:  22px;   /* hero containers */\n  --radius-pill: 999px;\n  --radius-card: var(--radius-lg);\n\n  /* ---- Border widths ---- */\n  --bw-hair:   1px;\n  --bw-thin:   1.5px;\n  --bw-thick:  2px;\n  --bw-accent: 3px;   /* status accents (left edge / underline) */\n\n  /* ---- Shadows (cool slate tint, civic-soft) ---- */\n  --shadow-xs: 0 1px 2px rgba(13, 18, 26, 0.06);\n  --shadow-sm: 0 1px 2px rgba(13, 18, 26, 0.06),\n               0 1px 3px rgba(13, 18, 26, 0.08);\n  --shadow-md: 0 2px 4px rgba(13, 18, 26, 0.06),\n               0 4px 12px rgba(13, 18, 26, 0.08);\n  --shadow-lg: 0 4px 8px rgba(13, 18, 26, 0.06),\n               0 12px 28px rgba(13, 18, 26, 0.12);\n  --shadow-xl: 0 8px 16px rgba(13, 18, 26, 0.08),\n               0 24px 56px rgba(13, 18, 26, 0.16);\n\n  /* glow for active/verified states */\n  --glow-approved: 0 0 0 4px color-mix(in oklab, var(--green-500) 18%, transparent);\n  --glow-rejected: 0 0 0 4px color-mix(in oklab, var(--red-500) 18%, transparent);\n  --glow-review:   0 0 0 4px color-mix(in oklab, var(--amber-400) 20%, transparent);\n\n  /* focus ring */\n  --focus-ring: 0 0 0 3px var(--ring);\n\n  /* inset hairline used on surfaces */\n  --inset-hairline: inset 0 0 0 1px var(--border-subtle);\n}\n\n[data-theme=\"dark\"] {\n  --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.4);\n  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.45);\n  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.5),\n               0 6px 16px rgba(0, 0, 0, 0.4);\n  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.55);\n  --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.6);\n}\n\n/* ============================================================\n   SecurePoll RW — Motion\n   Calm, purposeful, never bouncy. Civic systems feel deliberate.\n   ============================================================ */\n\n:root {\n  --ease-standard: cubic-bezier(0.2, 0, 0, 1); /* @kind other */\n  --ease-entrance: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --ease-exit:     cubic-bezier(0.4, 0, 1, 1); /* @kind other */\n\n  --dur-instant: 80ms;   /* @kind other */\n  --dur-fast:    140ms;  /* @kind other */\n  --dur-base:    220ms;  /* @kind other */\n  --dur-slow:    360ms;  /* @kind other */\n  --dur-slower:  560ms;  /* @kind other */\n\n  /* common composites */\n  --transition-control: background-color var(--dur-fast) var(--ease-standard),\n                        border-color var(--dur-fast) var(--ease-standard),\n                        color var(--dur-fast) var(--ease-standard),\n                        box-shadow var(--dur-fast) var(--ease-standard),\n                        transform var(--dur-fast) var(--ease-standard);\n}\n\n@media (prefers-reduced-motion: reduce) {\n  :root {\n    --dur-instant: 0ms; /* @kind other */\n    --dur-fast: 0ms; /* @kind other */\n    --dur-base: 0ms; /* @kind other */\n    --dur-slow: 0ms; /* @kind other */\n    --dur-slower: 0ms; /* @kind other */\n  }\n}\n\n/* ============================================================\n   SecurePoll RW — Base layer\n   Light element defaults built on the token system.\n   ============================================================ */\n\n*,\n*::before,\n*::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--role-body-size);\n  line-height: var(--role-body-line);\n  font-weight: var(--fw-regular);\n  color: var(--text-default);\n  background: var(--bg-canvas);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  font-feature-settings: \"ss01\", \"cv01\";\n}\n\nh1, h2, h3, h4, h5 {\n  font-family: var(--font-display);\n  font-weight: var(--fw-semibold);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-tight);\n  color: var(--text-strong);\n  margin: 0;\n  text-wrap: balance;\n}\n\np { margin: 0; text-wrap: pretty; }\n\na { color: var(--text-link); text-decoration: none; }\na:hover { text-decoration: underline; }\n\ncode, kbd, pre, samp {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n}\n\n::selection {\n  background: color-mix(in oklab, var(--primary) 28%, transparent);\n  color: var(--text-strong);\n}\n\n:focus-visible {\n  outline: none;\n  box-shadow: var(--focus-ring);\n  border-radius: var(--radius-sm);\n}\n\nhr {\n  border: none;\n  border-top: var(--bw-hair) solid var(--border-subtle);\n  margin: var(--space-6) 0;\n}\n\nsmall { font-size: var(--text-xs); }\n\n<\u002Fstyle>\n<style>/* ============================================================\n   SecurePoll RW — Architecture diagram language\n   Layered bands · node cards · labelled connectors.\n   Built on the design-system tokens.\n   ============================================================ */\n\n.arch {\n  font-family: var(--font-sans);\n  color: var(--text-default);\n  background:\n    radial-gradient(120% 80% at 50% -10%, color-mix(in oklab, var(--green-500) 5%, transparent), transparent 60%),\n    var(--bg-canvas);\n  padding: 40px 44px 48px;\n}\n\n.arch-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }\n.arch-head .ttl { display: flex; align-items: center; gap: 14px; }\n.arch-head .ttl > div { display: flex; flex-direction: column; gap: 5px; }\n.arch-head img.mark { height: 38px; }\n.arch-head h1 { font-family: var(--font-display); font-size: 28px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-strong); line-height: 1.05; }\n.arch-head .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--primary-text); line-height: 1.2; }\n.arch-head .meta { text-align: right; font-size: 11px; color: var(--text-muted); line-height: 1.6; }\n.arch-head .meta b { color: var(--text-strong); font-weight: 600; }\n\n/* ---- Layered band ---- */\n.band {\n  position: relative;\n  border: 1px solid var(--border-subtle);\n  border-radius: var(--radius-xl);\n  padding: 18px 20px 20px;\n  background: var(--band-service);\n}\n.band + .band { margin-top: 0; }\n.band--client  { background: var(--band-client); }\n.band--gateway { background: var(--band-gateway); border-color: var(--primary-soft-border); }\n.band--data    { background: var(--band-data); }\n.band--secure  { background: var(--band-secure); border-color: #1f3f73; }\n\n.band-label {\n  position: absolute; top: -10px; left: 18px;\n  background: var(--text-strong); color: #fff;\n  font-size: 10px; font-weight: 700; letter-spacing: var(--ls-caps); text-transform: uppercase;\n  padding: 4px 11px; border-radius: var(--radius-pill);\n}\n.band--gateway .band-label { background: var(--primary); }\n.band--secure  .band-label { background: #2f6fdb; }\n.band-note { position: absolute; top: -9px; right: 18px; font-size: 11px; color: var(--text-muted); background: var(--bg-canvas); padding: 2px 8px; }\n\n/* ---- Node grids ---- */\n.node-grid { display: grid; gap: 12px; }\n.cols-2 { grid-template-columns: repeat(2, 1fr); }\n.cols-3 { grid-template-columns: repeat(3, 1fr); }\n.cols-4 { grid-template-columns: repeat(4, 1fr); }\n.cols-6 { grid-template-columns: repeat(6, 1fr); }\n\n/* ---- Node card ---- */\n.node {\n  background: var(--bg-surface);\n  border: 1px solid var(--border-default);\n  border-radius: var(--radius-lg);\n  padding: 13px 14px;\n  box-shadow: var(--shadow-sm);\n  display: flex; flex-direction: column; gap: 4px;\n  min-height: 0;\n}\n.node .ico {\n  width: 30px; height: 30px; border-radius: var(--radius-md);\n  display: grid; place-items: center; margin-bottom: 4px;\n  background: var(--primary-soft); color: var(--primary-text);\n}\n.node .ico svg, .node .ico i { width: 17px; height: 17px; }\n.node h3 { font-family: var(--font-sans); font-size: 13.5px; font-weight: 600; color: var(--text-strong); line-height: 1.2; letter-spacing: -0.01em; }\n.node p { font-size: 11.5px; color: var(--text-muted); line-height: 1.35; }\n.node .tag {\n  align-self: flex-start; margin-top: 2px;\n  font-family: var(--font-mono); font-size: 10px; font-weight: 500;\n  color: var(--text-muted); background: var(--bg-inset);\n  border: 1px solid var(--border-subtle);\n  padding: 1px 6px; border-radius: var(--radius-sm);\n}\n.node--accent { border-color: var(--primary); box-shadow: var(--shadow-sm), 0 0 0 1px var(--primary); }\n.node--accent .ico { background: var(--primary); color: #fff; }\n.node--secure { background: #11243f; border-color: #2f6fdb; }\n.node--secure h3 { color: #eaf2ff; }\n.node--secure p { color: #9bb6e0; }\n.node--secure .ico { background: #2f6fdb; color: #fff; }\n.node--secure .tag { background: #0c1c33; border-color: #234a82; color: #9bb6e0; }\n\n/* db cylinder accent */\n.node--db .ico { background: var(--secondary-soft); color: var(--secondary-text); }\n\n/* ---- Connectors between bands ---- */\n.flow { display: flex; flex-direction: column; align-items: center; gap: 0; padding: 6px 0; }\n.flow .stem { width: 2px; height: 14px; background: var(--border-strong); }\n.flow .proto {\n  font-family: var(--font-mono); font-size: 11px; color: var(--text-default);\n  background: var(--bg-surface); border: 1px solid var(--border-default);\n  padding: 5px 14px; border-radius: var(--radius-pill); box-shadow: var(--shadow-xs);\n  display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;\n}\n.flow .proto svg, .flow .proto i { width: 13px; height: 13px; color: var(--primary); }\n.flow .arrow { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 7px solid var(--border-strong); }\n\n/* legend */\n.legend { display: flex; flex-wrap: wrap; gap: 16px 22px; margin-top: 26px; padding-top: 18px; border-top: 1px solid var(--border-subtle); }\n.legend .item { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--text-muted); }\n.legend .key { width: 26px; height: 14px; border-radius: 4px; flex-shrink: 0; box-shadow: var(--inset-hairline); }\n.legend b { color: var(--text-strong); font-weight: 600; }\n<\u002Fstyle>\n\n<style>\n  html,body { margin:0; background:var(--bg-canvas); }\n  .sp-topbar{\n    position:sticky; top:0; z-index:50; display:flex; align-items:center; gap:18px;\n    padding:12px 28px; background:color-mix(in oklab, var(--bg-surface) 88%, transparent);\n    backdrop-filter:saturate(1.4) blur(10px); -webkit-backdrop-filter:saturate(1.4) blur(10px);\n    border-bottom:1px solid var(--border-subtle); font-family:var(--font-sans);\n  }\n  .sp-topbar img{ height:30px; }\n  .sp-topbar .brand{ font-family:var(--font-display); font-weight:600; font-size:16px; color:var(--text-strong); letter-spacing:-0.01em; }\n  .sp-topbar .brand small{ display:block; font-family:var(--font-sans); font-weight:700; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:var(--primary-text); }\n  .sp-topbar nav{ margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; }\n  .sp-topbar nav a{\n    font-size:12px; font-weight:600; color:var(--text-muted); text-decoration:none;\n    padding:6px 12px; border-radius:var(--radius-pill); border:1px solid transparent; transition:var(--transition-control);\n  }\n  .sp-topbar nav a:hover{ color:var(--text-strong); background:var(--bg-subtle); }\n  .slide{ scroll-margin-top:64px; }\n  .slide + .slide{ border-top:1px solid var(--border-subtle); }\n  @media print {\n    .sp-topbar{ display:none; }\n    .slide{ break-after:page; border-top:none; }\n  }\n#d1 .canvas { width: 1340px; margin: 0 auto; }\n#d1 .stack { display: flex; flex-direction: column; }\n#d1 .gw { background: var(--bg-surface); border: 1px solid var(--primary-soft-border); border-radius: var(--radius-md); padding: 10px 12px; font-size: 12px; font-weight: 600; color: var(--text-strong); line-height: 1.3; box-shadow: var(--shadow-xs); display:flex; align-items:center; }\n#d2 .canvas { width: 1340px; margin: 0 auto; }\n#d2 .pipe { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; align-items: stretch; }\n#d2 .step { position: relative; padding: 0 9px; }\n#d2 .step:not(:last-child)::after { content: \"\"; position: absolute; top: 34px; right: -7px; width: 14px; height: 2px; background: var(--border-strong); z-index: 2; }\n#d2 .step:not(:last-child)::before { content: \"\"; position: absolute; top: 30px; right: -10px; z-index: 3;\n    border-left: 7px solid var(--border-strong); border-top: 5px solid transparent; border-bottom: 5px solid transparent; }\n#d2 .step-card { background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: 14px; box-shadow: var(--shadow-sm); height: 100%; display:flex; flex-direction:column; gap:7px; }\n#d2 .step-num { position:absolute; top:-9px; left:18px; width:24px;height:24px;border-radius:50%; background:var(--text-strong); color:#fff; font-family:var(--font-mono); font-size:12px; font-weight:700; display:grid; place-items:center; z-index:4; box-shadow: var(--shadow-sm); }\n#d2 .step-card .ico { width:34px;height:34px;border-radius:var(--radius-md); background:var(--primary-soft); color:var(--primary-text); display:grid; place-items:center; }\n#d2 .step-card .ico i { width:19px;height:19px; }\n#d2 .step-card h3 { font-size:13.5px; font-weight:600; color:var(--text-strong); line-height:1.25; }\n#d2 .step-card .svc { font-family:var(--font-mono); font-size:10px; color:var(--secondary-text); background:var(--secondary-soft); padding:2px 7px; border-radius:var(--radius-sm); alig v class=\"stage\">\n        <div class=\"stage-h\"><span class=\"badge\">1<\u002Fspan><h3>Pre-load<\u002Fh3><\u002Fdiv>\n        <div class=\"when\">Before election day<\u002Fdiv>\n        <div class=\"item\"><i data-lucide=\"zap\"><\u002Fi><div><div class=\"nm\">Redis biometric pre-cache<\u002Fdiv><div class=\"dt\">Templates for the station's roster pushed from the server<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"item\"><i data-lucide=\"download\"><\u002Fi><div><div class=\"nm\">Encrypted bundle → tablet<\u002Fdiv><div class=\"dt\">Written into local SQLite, AES-encrypted at rest<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"item\"><i data-lucide=\"check-check\"><\u002Fi><div><div class=\"nm\">Integrity check<\u002Fdiv><div class=\"dt\">Station confirms roster &amp; cache before polls open<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"stage stage--off\">\n        <div class=\"stage-h\"><span class=\"badge\">2<\u002Fspan><h3>Offline operation<\u002Fh3><\u002Fdiv>\n        <div class=\"when\">Network dropped<\u002Fdiv>\n        <div class=\"item\"><i data-lucide=\"scan-face\"><\u002Fi><div><div class=\"nm\">Local verification<\u002Fdiv><div class=\"dt\">Face / fingerprint matched on-device against the cache<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"item\"><i data-lucide=\"shield-check\"><\u002Fi><div><div class=\"nm\">Bloom filter = authority<\u002Fdiv><div class=\"dt\">Local \"voted set\" blocks double-voting until sync<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"store\">\n          <div class=\"sh\"><i data-lucide=\"database\"><\u002Fi>Local SQLite (encrypted)<\u002Fdiv>\n          <div class=\"srow\"><span class=\"k\"><\u002Fspan>Biometric cache <b>pre-loaded<\u002Fb><\u002Fdiv>\n          <div class=\"srow\"><span class=\"k\"><\u002Fspan>Verification queue <b>pending sync<\u002Fb><\u002Fdiv>\n          <div class=\"srow\"><span class=\"k hot\"><\u002Fspan>Voted bloom filter <b>double-vote lock<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"stage\">\n        <div class=\"stage-h\"><span class=\"badge\">3<\u002Fspan><h3>Reconnect &amp; reconcile<\u002Fh3><\u002Fdiv>\n        <div class=\"when\">Network restored<\u002Fdiv>\n        <div class=\"item\"><i data-lucide=\"upload-cloud\"><\u002Fi><div><div class=\"nm\">POST /verify/sync<\u002Fdiv><div class=\"dt\">Batch of queued verifications sent to Verification Service<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"item\"><i data-lucide=\"git-merge\"><\u002Fi><div><div class=\"nm\">Server processes queue<\u002Fdiv><div class=\"dt\">Sequential apply · row-locked VOTED writes to Voter DB<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"item\"><i data-lucide=\"bell\"><\u002Fi><div><div class=\"nm\">sync.completed<\u002Fdiv><div class=\"dt\">Election Ops + Notification updated; turnout reconciled<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"conn c1\"><span class=\"lbl\">push cache<\u002Fspan><i class=\"ar\" data-lucide=\"arrow-right\"><\u002Fi><\u002Fdiv>\n      <div class=\"conn c2\"><span class=\"lbl\">on reconnect<\u002Fspan><i class=\"ar\" data-lucide=\"arrow-right\"><\u002Fi><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"note\">\n      <i data-lucide=\"alert-triangle\"><\u002Fi>\n      <div class=\"nt\">End-of-day <b>reconciliation<\u002Fb> flags any station where the physical ballot count ≠ the system count — the offline bloom filter guarantees a voter can never be checked in twice, even with zero connectivity.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<script src=\"29f3017c-abbd-41ff-8e02-edde4417b235\"><\u002Fscript>\n<script>\n  function draw(){ if (window.lucide) lucide.createIcons(); }\n  draw(); window.addEventListener('load', draw);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
