name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Pure unit tests — no secrets, no database, runs on every push/PR
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (required by insightface/onnxruntime)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-glx libglib2.0-0

      - name: Install project with dev extras
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        env:
          # Minimal env so config.py doesn't fail (unit tests override these)
          DATABASE_URL: "postgresql://unit:test@localhost:5432/unit_noop"
          JWT_SECRET: "ci-unit-test-secret-at-least-32-chars"
          TEMPLATE_AES_KEY: "aabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccdd"
        run: |
          cd Backend
          python -m pytest tests/unit/ \
            -m unit \
            --tb=short \
            -q \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml

      - name: Upload unit coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: Backend/coverage-unit.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Integration tests — requires real Supabase credentials (secrets)
  # Runs only on pushes/PRs to main or develop; skipped on feature branches
  # unless DATABASE_URL is available.
  # ─────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-glx libglib2.0-0

      - name: Install project with dev extras
        run: pip install -e ".[dev]"

      - name: Run integration tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TEMPLATE_AES_KEY: ${{ secrets.TEMPLATE_AES_KEY }}
          ACCESS_TOKEN_MINUTES: "30"
          FACE_MATCH_THRESHOLD: "0.80"
          REVIEW_FLOOR: "0.60"
          DEDUP_THRESHOLD: "0.85"
          FAISS_INDEX_PATH: "ml/faiss/index.bin"
          DEBUG: "false"
        run: |
          cd Backend
          python -m pytest tests/ \
            -m integration \
            --ignore=tests/unit \
            --tb=short \
            -q \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-integration.xml

      - name: Upload integration coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: Backend/coverage-integration.xml
          retention-days: 7
