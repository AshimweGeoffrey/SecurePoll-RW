"""Docker Compose configuration."""
version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: securepoll_app
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: securepoll
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securepoll_app -d securepoll"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    environment:
      - DATABASE_URL=postgresql://securepoll_app:change_me@db:5432/securepoll

volumes:
  pgdata:
